[theme]
theme = "plain"

[theme.overrides]
idle_fg = "#ffffff"
info_fg = "#ffffff"

[icons]
icons = "none"

[icons.overrides]
volume = "V"
volume_muted = "M"

[[block]]
block = "net"
device = "wlan0"
format = "$bitrate.eng(w:3): $signal_strength [$ssid]"
inactive_format = "no WiFi"
interval = 5

# [[block]]
# block = "net"
# device = "eth0"
# format = "E: $speed_down.eng|$ip"
# inactive_format = ""
# interval = 2

[[block]]
block = "sound"
format = "$icon: $volume"
show_volume_when_muted = true
step_width = 5

[[block]]
block = "battery"
format = "BAT: $percentage.eng(w:5) {[$time_remaining.dur(hms:true)]|}"
charging_format = "CHR: $percentage.eng(w:5) {[$time_remaining.dur(hms:true)]|}"
full_format = "FULL: $percentage"
interval = 2
full_threshold = 75.0

# [[block]]
# block = "music"
# format = "$player"

[[block]]
block = "cpu"
format = "CPU: $utilization"
interval = 1

[[block]]
block = "memory"
format = "RAM: $mem_avail.eng(w:5)"
interval = 5
warning_mem = 75.0
critical_mem = 96.875

[[block]]
block = "disk_space"
path = "/"
format = "SSD: $available.eng(w:5)"
interval = 20

[[block]]
block = "time"
format = "$timestamp.datetime(f:'%Y-%m-%d %H:%M:%S')"
interval = 1
